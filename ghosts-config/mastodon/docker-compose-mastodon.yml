###############################################################################
# docker-compose-mastodon.yml
#
# Standalone Mastodon stack for GHOSTS NPC Framework cyber exercises.
# Shares PostgreSQL with the main GHOSTS stack via the external network.
#
# Usage:
#   docker compose -f docker-compose-mastodon.yml up -d
#
# Prerequisites:
#   - The main GHOSTS stack must be running (provides ghosts-postgres + network)
#   - .env.mastodon must exist in this directory (created by setup-mastodon.sh)
#   - The mastodon database must be created on ghosts-postgres
#
# Port mapping:
#   8000 -> Mastodon web (replaces Pandora/Socializer)
#   4000 -> Mastodon streaming API
###############################################################################

services:
  mastodon-redis:
    image: redis:7-alpine
    container_name: mastodon-redis
    restart: unless-stopped
    networks:
      - mastodon-internal
    volumes:
      - mastodon-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --save 60 1 --loglevel warning

  mastodon-web:
    image: ghcr.io/mastodon/mastodon:v4.3.7
    container_name: mastodon-web
    restart: unless-stopped
    env_file: .env.mastodon
    command: bundle exec puma -C config/puma.rb
    ports:
      - "8000:3000"
    networks:
      - mastodon-internal
      - ghosts-external
    volumes:
      - mastodon-system:/opt/mastodon/public/system
      - ./rack_attack.rb:/opt/mastodon/config/initializers/rack_attack.rb:ro
    depends_on:
      mastodon-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mastodon-streaming:
    image: ghcr.io/mastodon/mastodon:v4.3.7
    container_name: mastodon-streaming
    restart: unless-stopped
    env_file: .env.mastodon
    command: node ./streaming/index.js
    ports:
      - "4000:4000"
    networks:
      - mastodon-internal
      - ghosts-external
    depends_on:
      mastodon-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/api/v1/streaming/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    extra_hosts:
      - "host.docker.internal:host-gateway"

  mastodon-sidekiq:
    image: ghcr.io/mastodon/mastodon:v4.3.7
    container_name: mastodon-sidekiq
    restart: unless-stopped
    env_file: .env.mastodon
    command: bundle exec sidekiq
    networks:
      - mastodon-internal
      - ghosts-external
    volumes:
      - mastodon-system:/opt/mastodon/public/system
    depends_on:
      mastodon-redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  mastodon-internal:
    driver: bridge
  ghosts-external:
    # The main GHOSTS docker-compose creates this network automatically.
    # The default name is "{directory}_default" where {directory} is the
    # folder containing the main docker-compose.yml.
    # Adjust the name below to match your GHOSTS installation directory.
    external: true
    name: ghosts_default

volumes:
  mastodon-redis:
  mastodon-system:
