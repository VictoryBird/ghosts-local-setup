###############################################################################
# docker-compose-mastodon.yml
#
# Mastodon for GHOSTS NPC Framework — Air-gapped cyber exercise SNS
# Shares PostgreSQL with the main GHOSTS stack via external network.
#
# Usage:
#   cd ~/ghosts/config-repo/ghosts-config/mastodon
#   docker compose -f docker-compose-mastodon.yml up -d
#
# Ports:
#   8000 -> Mastodon web UI (replaces Pandora)
###############################################################################

services:
  mastodon-redis:
    image: redis:7-alpine
    container_name: mastodon-redis
    restart: unless-stopped
    networks:
      - mastodon-internal
    volumes:
      - mastodon-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --save 60 1 --loglevel warning

  mastodon-web:
    image: ghcr.io/mastodon/mastodon:v4.3.7
    container_name: mastodon-web
    restart: unless-stopped
    env_file: .env.mastodon
    environment:
      - RAILS_ENV=production
      - NODE_ENV=production
      - BIND=0.0.0.0
      - PORT=3000
    command: bundle exec puma -C config/puma.rb
    ports:
      - "8000:3000"
    networks:
      - mastodon-internal
      - ghosts-external
    volumes:
      - mastodon-system:/opt/mastodon/public/system
      - ./rack_attack.rb:/opt/mastodon/config/initializers/rack_attack.rb:ro
      - ./disable_ssl_and_hosts.rb:/opt/mastodon/config/initializers/zz_disable_ssl_and_hosts.rb:ro
    depends_on:
      mastodon-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  mastodon-sidekiq:
    image: ghcr.io/mastodon/mastodon:v4.3.7
    container_name: mastodon-sidekiq
    restart: unless-stopped
    env_file: .env.mastodon
    environment:
      - RAILS_ENV=production
      - NODE_ENV=production
    command: bundle exec sidekiq
    networks:
      - mastodon-internal
      - ghosts-external
    volumes:
      - mastodon-system:/opt/mastodon/public/system
    depends_on:
      mastodon-redis:
        condition: service_healthy

volumes:
  mastodon-redis:
  mastodon-system:

networks:
  mastodon-internal:
    internal: true
  ghosts-external:
    name: ghosts_default
    external: true
