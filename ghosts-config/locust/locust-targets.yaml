# =============================================================================
# Locust Target Configuration
# =============================================================================
# 현장 네트워크 환경에 맞게 수정하세요.
#
# 구조:
#   networks:
#     - name: 네트워크 식별 이름
#       targets: 대상 웹서버 URL 목록
#       users: 동시 가상 유저 수 (트래픽 강도 조절)
#       spawn_rate: 초당 유저 생성 속도 (기본: 1)
#       source_ips: 소스 IP 목록 (VM 인터페이스에 할당 필요)
#
# 소스 IP 사용 시 사전 설정:
#   sudo ip addr add 10.0.1.100/24 dev eth0
#   sudo ip addr add 10.0.1.101/24 dev eth0
#   ...
# =============================================================================

networks:
  - name: "network-a"
    targets:
      - http://10.0.1.10
      - http://10.0.1.20
      - http://10.0.1.30
    users: 5
    spawn_rate: 1
    source_ips:
      - 10.0.1.100
      - 10.0.1.101
      - 10.0.1.102

  - name: "network-b"
    targets:
      - http://10.0.2.10
      - http://10.0.2.20
    users: 3
    spawn_rate: 1
    source_ips:
      - 10.0.2.100
      - 10.0.2.101

